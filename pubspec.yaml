name: drone_flight_planner
description: Flight planning and autonomous drone control app for DJI Air 2S
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.0
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  
  # State Management
  provider: ^6.0.0
  
  # Data & Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  json_serializable: ^6.7.1
  
  # DJI SDK
  dji_flutter_core: ^1.0.0
  
  # Utilities
  intl: ^0.19.0
  logging: ^1.2.0
  latlong2: ^0.9.0
  
  # HTTP & Serialization
  http: ^1.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

android:
  minSdkVersion: 29
